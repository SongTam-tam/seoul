<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SeoulAsan</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/public.css" />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/ani.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
    </head>
    <body>
        <div id="wrap">
            <div class="search">
                <!-- 검색부분 -->
            </div>
            <!-- search -->
            <header id="header">
                <!-- 헤더부분 -->
                <!-- header부분 inner -->
            </header>
            <!-- header -->
            <section id="visual">
                <video
                    src="./videos/seoulAsan0.mp4"
                    class="video-visual"
                    muted
                    autoplay
                    loop
                ></video>
                <div class="inner">
                    <div class="gage">
                        <span>1 / 2</span>
                        <p></p>
                        <strong></strong>
                        <div class="btn">
                            <button class="prev"><i class="xi-angle-left"></i></button>
                            <button class="next"><i class="xi-angle-right"></i></button>
                            <button class="stop"><i class="xi-pause"></i></button>
                        </div>
                    </div>
                    <!-- gage -->
                </div>
                <!-- inner -->
            </section>
            <!-- visual -->
            <footer id="footer">
                <!-- 푸터부분 -->
                <!-- inner -->
            </footer>
            <!-- footer -->
        </div>
        <!-- wrap -->
        <script src="./js/main.js"></script>
        <script type="module" src="./js/public.js"></script>
        <script type="module" src="./js/main.js"></script>
    </body>
</html>
